<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrafos y Encabezados</title>
</head>
<body>
<!-- Titulos o Encabezados:
Se tienen 6 tipos de encabezados; desde el h1 hasta el 6. -->
<!-- (h$*6) Crea 6 títulos en orden del 1 al 6 Emmet -->
    <h1>Titulo</h1>
    <!-- El h1 se utiliza una sola vez por pagina web esto es debido a que el h1 tiene  una importancia en el CEO lo que es el posicionamiento Web, es decir, le da mucha importancia al h1 -->
     <h2></h2>
     <h3></h3>
     <h4></h4>
     <h5></h5>
     <h6></h6>
    <!-- Desde el h2 hasta el h6, se pueden utilizar las veces que sean necesarias según el contenido que se quiera recrear. -->

    <!-- Párrafo: Los párrafos deben tener una idea o punto especifico.
    Cada párrafo escrito debe de contener un concepto, una idea. Es decir, puede describir una sección o un elemento, hasta un mensaje en el chat. Por ejeplo en una sección se habla sobre los beneficios del ejercicio:
    Un párrafo puee tratar de mejorar la salud cardiovascular y otro puede ser sobrelos beneficios y cuidados de la salud menta. Finalmente, debe existir un motivo para que exista un párrafo. -->
<p>
    Lorem ipsum dolor sit amet, consectetur adipisicing elit. Illum, provident. Veniam maxime, cum possimus rem, reprehenderit nobis assumenda, nostrum saepe eligendi ducimus exercitationem? Aut tenetur, quos reprehenderit iure alias voluptas.
    <!--(CTRL+SHIFT+P) o (ALT+Z) Ajusta el contendio del párrafo a la venta del editor  -->
    <!-- Existen algunas tecnologias de asistencia como lectores de pantalla , que ayudan a las personas con discapacidadvisual a navegar por el contenido web.
     Por ejmeplo: cuando estas tecnologías leen el h1 de la página, entienden de qie trata la página por el h1. Por temas de accesibilidad web es importante que se utilice un h1 por página. -->
</p>
</body>
</html>
