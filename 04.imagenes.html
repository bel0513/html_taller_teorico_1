<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagenes</title>
    <!-- https://techicons.dev/icon/react -->
</head>
<body>
    <!-- Etiquetas de Bloque y Etiquetas de línea -->
     <h1>Imagenes</h1>
        <!-- Las imagenes se insertan en HTML utilizando la etiqueta img. Esta etiqueta es un elemento vacío, lo que significa que no tiene una etiqueta de cierre. La sintaxis básica para insertar una imagen es: -->

<!--  Vale la pena recordar que el atributo title proporciona un tooltip que se muestra cuando el usuario para el mouse sobre la imagen --> 
  <img src="Dry Bones 144p.jfif" alt="Dry Bones" title="Dry Bones" width="200" height="200">
  <!-- Para que los lectores de pantalla puedan saber de que se trata la imagen el atributo alt (alternative text) es muy importante puesto que proporciona una descripción textualde la imagen para accesibilidad y como fallback si no se carga. EL texto alternativo debe ser descrptivo y conciso, y debe transmitir la información esencial que la imagen representa. Por ejemplo, si la imagen es un logotipo de una empresa, el texto alternativo podría ser "logotipode la empresa XYZ". Si la imagen es una fotografía de un paisaje, el texto alternativo podría ser "fotografía de un paisaje con montañas y un lago". En resumen, el atributo alt proporciona una descripcion de la imagen en caso de que no se pueda cargar -->

  <!-- Self Closing Tags son etiquetas que se autocierran. -->
    </body>
</html>
