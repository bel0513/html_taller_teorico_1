<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlaces</title>
</head>
<body>
    <!-- Los enlaces o anclas o hipervinculos -->
     <!-- a (anchor) significa "ancla". Metafora: como en un barco se mantiene en una ubicación específica un ancla es justamente para que el usuario sepa hacia dónde buscar un recurso o hacia dónde navegar en la página web. -->

     <!-- Los atributos son características que definen el comportamiento yy la apariencia de los elementos en este caso el atributo href vuele funcional a la etquieta es por esta razón que se utiliza en el maquetado y no en el css dado que no es una característica visual. -->
     <!-- href (hyper reference) esla referencia a un recurso, es decir, el destino del enlace. -->
     <!-- Lo que está dentro de la etiqueta a es el texto visible que el usuario vera en la página web. Mientras que lo que está dentro de href es la referencia al recurso al que apunta en enlace. -->
     <h2 title="titulo de la pagina">Enlaces o anclas</h2>
    <!-- Por otra parte, el atributo title proporciona un texto de ayuda que se muestra cuando el usuario para el mouse sobre el enlace. Las tecnologias de asistencia como lectores de pantalla utilizan este atributo para proporcionar infromación adicional al usuario. En el caso de personas invidentes esto les permite acceder a información adicional sobre el enlace. -->

    <a href="https://www.google.com">Google</a>
    <br>
    <a href="https://www.facebook.com">Facebook</a>
    <br>
    <a href="https://www.youtube.com">Youtube</a>
    <br>
    <a title="Ir al canal de youtube" href="https://www.youtube.com/@ramcrack0584">Ramcrack</a> <!-- Mala práctica: usar protocolo relativo sin especificar el protocolo. -->
    <br>
    <br>
    <a href="03-1_pagina_enlace1.html">Ir al enlace uno</a>
    <br>
    <a href="03-2_pagina_enlace2.html">Ir al enlace dos</a>
    <br>
    <a href="03-3_pagina_enlace3.html">Ir al enlace tres</a>
    <!-- Es sumamente importante que en la programación y el desarrollo web se realicen las prácticas a medida que va avanzando, de esta forma se asegura una mejora compresión y aplicacion de los conceptos aprendidos. ENtiendan que la programación es un proceso activo no pasivo, una cosa es intentar comprender lo que sucede cuando leen o ven algo que se esta haciendo, sin embargo, la única forma de aprender es probando ustedes mismos todo lo que se debe implementar.-->
    <br>

     <h2>Enlaces con target a otra ventana</h2>
    <a href="03-4_pagina_enlace4.html" target="_blank">Ir al enlace cuatro en una nueva ventana</a>
    <!-- El atributo target="_blank" abre el enlace en una nueva ventana o pestaña del navegador. Por defecto siempre esta en self que significa que se abre en la misma ventana. -->
    </body>
</html>
